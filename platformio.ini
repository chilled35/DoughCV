[env:xiao_esp32s3_sense]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; Camera support requires PSRAM
board_build.arduino.memory_type = qio_opi
build_flags =
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    ; Triangulation geometry — edit to match your rig
    ; LASER_ANGLE_DEG: angle of the laser beam from vertical (degrees)
    ; CAMERA_BASELINE_MM: horizontal distance between laser exit and camera principal point (mm)
    ; FOCAL_LENGTH_PX: camera focal length in pixels (OV2640 at 96x96 ≈ 88 px)
    -DLASER_ANGLE_DEG=30.0f
    -DCAMERA_BASELINE_MM=30.0f
    -DFOCAL_LENGTH_PX=88.0f
    ; Dot detection
    ; DETECT_THRESHOLD: 0–255, minimum channel value to count as laser dot
    -DDETECT_THRESHOLD=180
    ; Report interval in milliseconds
    -DREPORT_INTERVAL_MS=500

lib_deps =
    ; esp32-camera is bundled with the Espressif Arduino core — no extra dep needed

[env:native_test]
platform = native
build_flags =
    -std=c++17
    -DNATIVE_TEST
    -DLASER_ANGLE_DEG=30.0f
    -DCAMERA_BASELINE_MM=30.0f
    -DFOCAL_LENGTH_PX=88.0f
    -DDETECT_THRESHOLD=180
