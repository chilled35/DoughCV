substitutions:
  device_name: dough-cv
  friendly_name: "DoughCV Monitor"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  platformio_options:
    board_build.arduino.memory_type: qio_opi   # Enable OPI PSRAM on XIAO S3

esp32:
  board: seeed_xiao_esp32s3
  variant: esp32s3
  framework:
    type: arduino

psram:
  mode: octal
  speed: 80MHz

logger:
  level: INFO

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${friendly_name} AP"
    password: !secret ap_fallback_password

captive_portal:

web_server:
  port: 80

# ── I²C buses ────────────────────────────────────────────────────────────────
# Camera SCCB (OV2640 control) uses its own dedicated I²C bus on GPIO40/39.
# A second bus on GPIO5/6 is available for future add-on sensors.
i2c:
  - id: camera_i2c
    sda: GPIO40
    scl: GPIO39
    frequency: 100kHz
  # - id: sensor_i2c
  #   sda: GPIO5
  #   scl: GPIO6

# ── OV2640 camera (XIAO ESP32-S3 Sense pin map) ───────────────────────────────
esp32_camera:
  name: "Dough Camera"
  external_clock:
    pin: GPIO10
    frequency: 20MHz
  i2c_id: camera_i2c
  data_pins: [GPIO15, GPIO17, GPIO18, GPIO16, GPIO14, GPIO12, GPIO11, GPIO48]
  vsync_pin: GPIO38
  href_pin:  GPIO47
  pixel_clock_pin: GPIO13
  resolution: 160x120
  max_framerate: 2fps
  frame_buffer_count: 1  # one frame buffer — prevents FB-OVF at boot and idle

# ── Camera web server (snapshot only — avoids continuous FB-OVF from streaming)
esp32_camera_web_server:
  - port: 81
    mode: snapshot

# ── Structured-light CV component ────────────────────────────────────────────
external_components:
  - source:
      type: local
      path: components

dough_cv:
  id: dough_cv
  laser_angle_deg: 30.0       # Angle of laser from vertical — measure your mount
  mount_height_mm: 200.0      # Height of sensor above the dough surface
  dot_threshold: 180          # Red-channel threshold for laser dot detection (0-255)
  process_interval_ms: 2000   # How often to run the CV pipeline
  scale_factor: 1.0           # Empirical scale: set to (known_height / reported_height)

  rise_height:
    name: "Rise Height"
    unit_of_measurement: mm
    accuracy_decimals: 1

  footprint:
    name: "Footprint Diameter"
    unit_of_measurement: mm
    accuracy_decimals: 1

  dot_count:
    name: "Line Coverage"
    unit_of_measurement: "%"
    accuracy_decimals: 0

# ── Calibration controls ──────────────────────────────────────────────────────
button:
  - platform: template
    name: "Capture Calibration"
    icon: mdi:camera-iris
    on_press:
      - lambda: "id(dough_cv)->capture_calibration();"

  - platform: template
    name: "Clear Calibration"
    icon: mdi:camera-off
    on_press:
      - lambda: "id(dough_cv)->clear_calibration();"

binary_sensor:
  - platform: template
    name: "Calibration Valid"
    icon: mdi:check-circle
    lambda: "return id(dough_cv)->is_calibrated();"
    filters:
      - delayed_on: 100ms

# ── Status LED (XIAO S3 built-in) ────────────────────────────────────────────
light:
  - platform: status_led
    name: "Status LED"
    pin: GPIO21
